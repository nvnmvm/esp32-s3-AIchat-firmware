name: Firmware CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:

jobs:
  build-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Prepare example config
        run: cp include/config.example.h include/config.h

      - name: Build firmware
        run: pio run
